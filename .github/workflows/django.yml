name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest


    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: DB_NAME
          POSTGRES_USER: DB_USER
          POSTGRES_PASSWORD: DB_PASSWORD   v
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4 # По-нова версия на action-а
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      # 2. Описваме променливите, които Django очаква да прочете от .env
      env:
        DB_NAME: DB_NAME
        DB_USER: DB_USER
        DB_PASSWORD: DB_PASSWORD
        DB_HOST: DB_HOST
        DB_PORT: 5432
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DEBUG: "False"
      run: |
        python manage.py test
