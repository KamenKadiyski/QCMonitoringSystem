name: CI Pipeline (Backend & Frontend)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  # --- ТЕСТОВЕ ЗА BACKEND (Django) ---
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: qc_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14" # Използвай стабилна версия
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests
        env:
          DB_NAME: qc_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: "django-insecure-test-key"
          SENTRY_LINK: ""
          # PYTHONPATH сочи към backend, за да може 'import accounts' да работи правилно
          PYTHONPATH: ${{ github.workspace }}
        run: |
          
          
          python manage.py test accounts equipment

