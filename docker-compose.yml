services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: qc_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/qc_db
      DEBUG: "False"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
